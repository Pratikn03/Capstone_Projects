theorems:
  - id: T1
    title: OASG Existence
    surface_kind: theorem
    defense_tier: flagship_defended
    proof_tier: V1
    program_role: phenomenon_existence
    status: active
    scope_note: Defended as the battery witness-row OASG existence theorem under explicit arbitrage reachability and controller-fault independence assumptions.
    statement_source:
      file: chapters_merged/ch04_theoretical_foundations.tex
      needle: '\begin{theorem}[OASG Existence]'
    proof_source:
      file: appendices/app_c_full_proofs.tex
      needle: '\section{C.1\quad Battery-Domain OASG Existence}'
    assumptions:
      - A1
      - A2
      - A4
      - A11
      - A12
    unresolved_assumptions: []
    dependencies:
      - Lemma: Observation gap under dropout
      - Lemma: Boundary proximity under arbitrage
    weakest_step: Boundary reachability remains domain-specific and is discharged here by explicit arbitrage reachability rather than by a generic dispatch argument.
    rigor_rating: paper_rigorous
    code_correspondence: partial
    code_correspondence_detail: Runtime and benchmark code expose observed-vs-true disagreement directly, but the arbitrage reachability step remains a theorem-level assumption rather than a runtime proof object.
    severity_if_broken: high
    remediation_class: add assumption
    remediation_detail: Keep A11 explicit and battery-scoped unless a stronger dispatch-model derivation is written.
    code_anchors:
      - path: src/orius/orius_bench/metrics_engine.py
        symbol: compute_oasg
        note: Counts observation-action safety gaps.
      - path: src/orius/cpsbench_iot/runner.py
        symbol: run_single
        note: Exposes true and observed trajectories on the battery witness row.
    test_anchors:
      - path: tests/test_oasg_metrics.py
        symbol: test_signature_equals_exposure_times_severity
        note: Metric-level witness for OASG exposure.
    legacy_aliases: []
    generator_targets:
      - active_theorem_audit
      - defended_theorem_core
      - theorem_surface_register
      - battery_claim_evidence_register
    claim_evidence:
      chapter: ch16
      token: THM_T1
      artifact_path: reports/publication/dc3s_main_table_ci.csv
  - id: T2
    title: Safety Preservation
    surface_kind: theorem
    defense_tier: flagship_defended
    proof_tier: V3
    program_role: one_step_runtime_guarantee
    status: active
    scope_note: Defended as a one-step true-state postcondition whose tightened margin already absorbs the one-step model-error allowance.
    statement_source:
      file: chapters_merged/ch04_theoretical_foundations.tex
      needle: '\begin{theorem}[Safety Preservation]'
    proof_source:
      file: appendices/app_c_full_proofs.tex
      needle: '\section{C.2\quad One-Step Safety Preservation}'
    assumptions:
      - A1
      - A2
      - A3
      - A4
      - A5
      - A7
    unresolved_assumptions: []
    dependencies:
      - Proposition: Inflated set contains the current state
      - Proposition: Tightened feasibility implies true feasibility
    weakest_step: The absorbed tightening must match the runtime FTIT/shield implementation exactly; any separation between theory margin and repair margin breaks the V3 story.
    rigor_rating: proof_runtime_linked
    code_correspondence: matches
    code_correspondence_detail: The battery tightening, repair, guarantee check, and runtime assertion surface all carry the absorbed margin explicitly.
    severity_if_broken: critical
    remediation_class: strengthen proof
    remediation_detail: Keep the absorbed margin explicit in theorem text, repair metadata, and true-state invariance checks.
    code_anchors:
      - path: src/orius/dc3s/safety_filter_theory.py
        symbol: tightened_soc_bounds
        note: Computes the absorbed tightening margin.
      - path: src/orius/dc3s/guarantee_checks.py
        symbol: check_soc_invariance
        note: Checks the true-state one-step postcondition with model-error slack.
      - path: src/orius/certos/runtime.py
        symbol: CertOSRuntime.validate_and_step
        note: Enforces the runtime theorem hook for one-step safety.
    test_anchors:
