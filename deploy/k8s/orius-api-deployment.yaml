apiVersion: apps/v1
kind: Deployment
metadata:
  name: orius-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orius-api
  template:
    metadata:
      labels:
        app: orius-api
    spec:
      containers:
        - name: api
          image: orius-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: orius-config
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 20
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30

