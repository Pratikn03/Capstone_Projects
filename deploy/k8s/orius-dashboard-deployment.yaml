apiVersion: apps/v1
kind: Deployment
metadata:
  name: orius-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orius-dashboard
  template:
    metadata:
      labels:
        app: orius-dashboard
    spec:
      containers:
        - name: dashboard
          image: orius-dashboard:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: orius-config
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 60

