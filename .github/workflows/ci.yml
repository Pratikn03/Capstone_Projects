name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install ruff mypy pre-commit pytest build
          pip install -e .
      - name: Ruff Check
        run: ruff check src services scripts
      - name: Ruff Format Check
        run: ruff format --check src services scripts
      - name: Mypy
        run: mypy src
      - name: Run tests
        run: pytest -q -m "not slow and not integration" --no-cov
      - name: Validate Paper Claims
        run: python scripts/validate_paper_claims.py
      - name: Check Paper Asset Sync
        run: python scripts/sync_paper_assets.py --check
      - name: Build package
        run: python -m build

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
