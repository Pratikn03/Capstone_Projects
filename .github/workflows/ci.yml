name: CI

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install ruff mypy pre-commit pytest pytest-cov build
          pip install -e .
      - name: Ruff Check
        run: ruff check src services scripts
      - name: Code Health Gate
        run: python scripts/audit_code_health.py --config configs/publish_audit.yaml
      - name: Deployment Security Gate
        run: python scripts/validate_deployment_security.py
      - name: Ruff Format Check
        run: ruff format --check src services scripts
      - name: Mypy
        run: mypy src
      - name: Run tests
        run: pytest -q -x --tb=short -m "not slow and not integration" --no-cov
      - name: Coverage bar
        run: |
          pytest -q --tb=short \
            tests/test_coverage_theorem.py \
            tests/test_universal_validation_gate.py \
            tests/test_domain_closure_matrix.py \
            tests/test_external_real_data_integration.py \
            tests/test_phase1_data_glue.py \
            tests/test_real_data_manifest_refresh.py \
            --cov=scripts \
            --cov=orius \
            --cov-report= \
            --cov-fail-under=0
          coverage report \
            --include="scripts/_dataset_registry.py,scripts/refresh_real_data_manifests.py,scripts/build_aerospace_public_adsb_runtime.py,src/orius/orius_bench/real_data_loader.py" \
            --fail-under=80
          coverage xml \
            --include="scripts/_dataset_registry.py,scripts/refresh_real_data_manifests.py,scripts/build_aerospace_public_adsb_runtime.py,src/orius/orius_bench/real_data_loader.py" \
            -o reports/coverage.xml
      - name: Check Formal Item Counts
        run: python scripts/count_formal_items.py --strict
      - name: Validate Paper Claims
        run: python scripts/validate_paper_claims.py
      - name: Validate Theory Surface
        run: python scripts/validate_theorem_surface.py
      - name: Check Paper Asset Sync
        run: python scripts/sync_paper_assets.py --check
      - name: Paper 1 Lock Drift Check
        run: python scripts/check_paper1_lock_drift.py
      - name: Build package
        run: python -m build

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        working-directory: frontend
        run: npm ci
      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build
      - name: Start dashboard
        working-directory: frontend
        run: |
          npm run start > /tmp/orius-dashboard.log 2>&1 &
          echo $! > /tmp/orius-dashboard.pid
      - name: Smoke dashboard routes
        working-directory: frontend
        run: npm run smoke:routes -- --base-url http://127.0.0.1:3000 --wait
      - name: Stop dashboard
        if: always()
        run: |
          if [ -f /tmp/orius-dashboard.pid ]; then
            kill "$(cat /tmp/orius-dashboard.pid)" || true
          fi
