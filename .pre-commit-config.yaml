repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.13
    hooks:
      - id: ruff
        args: ["check", "--config", "ruff.toml", "src", "services", "scripts"]
      - id: ruff-format
        args: ["--config", "ruff.toml", "src", "services", "scripts"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        args: ["--config-file", "mypy.ini", "src"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

  - repo: local
    hooks:
      - id: validate-no-appledouble
        name: validate-no-appledouble
        entry: python3 scripts/validate_no_appledouble.py --root . --exclude-active
        language: system
        pass_filenames: false
      - id: validate-workspace-hygiene
        name: validate-workspace-hygiene
        entry: python3 scripts/validate_workspace_hygiene.py --root . --exclude-active
        language: system
        pass_filenames: false
