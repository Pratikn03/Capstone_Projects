target: "load_mw"

# Features to include in the input vector.
# Use price_col to pick the right price feature per country:
#   DE → price_eur_mwh   US → price_usd_mwh
# The training script should resolve "price_col" to whichever column
# exists in the parquet (fallback order below).
price_col_priority:
  - "price_eur_mwh"
  - "price_usd_mwh"

features:
  - "load_mw"
  - "wind_mw"
  - "solar_mw"
  - "hour"
  - "dayofweek"
  - "is_weekend"
  - "season"
  - "is_holiday"
  - "is_morning_peak"
  - "is_evening_peak"
  - "carbon_kg_per_mwh"

# Country-specific feature overrides (merged at runtime)
features_de:
  - "price_eur_mwh"
  - "wx_temperature_2m"
  - "wx_wind_speed_10m"
  - "wx_cloud_cover"

features_us:
  - "price_usd_mwh"
  - "wx_temperature_2m"
  - "wx_wind_speed_10m"
  - "wx_cloud_cover"

training:
  lookback: 168   # 1 week history
  horizon: 24     # 24 hour forecast
  batch_size: 64
  epochs: 300               # Increased from 50 for proper convergence
  learning_rate: 0.0003     # Reduced from 0.001 for stability
  weight_decay: 1e-4        # L2 regularization
  scheduler: cosine_warm_restarts
  warmup_epochs: 10
  T_0: 50                   # Warm restart period
  T_mult: 2
  gradient_clip: 0.5        # Gradient clipping for stability
  early_stopping:
    enabled: true
    patience: 30
    min_delta: 0.00005

model:
  hidden_size: 512          # Increased from 64 for capacity
  num_layers: 2
  dropout: 0.2              # Increased from 0.1
  bidirectional: true       # Bidirectional LSTM
  attention: true           # Attention mechanism
  residual: true            # Residual connections