dc3s:
  assumptions_version: dc3s-assumptions-v1
  alpha0: 0.10
  alpha_min: 0.02
  k_quality: 0.8
  k_drift: 0.6
  k_sensitivity: 0.4
  infl_max: 3.0
  beta_reliability: 0.7
  beta_sensitivity: 0.5
  cooldown_smoothing: 0.0
  ambiguity:
    lambda_mw: 0.0
    learn_lambda_from_quantile: false
    lambda_quantile: 0.95
    lambda_scale: 1.0
    lambda_min_mw: 0.0
    min_w: 0.05
    max_extra: 1.0
  rac_cert:
    enabled: true
    beta_reliability: 0.7
    beta_sensitivity: 0.5
    k_sensitivity: 0.4
    sensitivity_probe: heuristic
    sens_eps_mw: 25.0
    sens_norm_ref: 0.5
    qhat_shrink_tau: 30.0
    max_q_multiplier: 3.0
  expected_cadence_s: 3600
  reliability:
    lambda_delay: 0.002
    spike_beta: 0.25
    ooo_gamma: 0.35
    min_w: 0.05
  drift:
    detector: page_hinkley
    ph_delta: 0.01
    ph_lambda: 5.0
    warmup_steps: 48
    cooldown_steps: 24
  shield:
    mode: projection
    reserve_soc_pct_drift: 0.08
    cvar:
      beta: 0.90
      n_scenarios: 20
      risk_weight_cvar: 1.0
      scenario_seed: 0
  audit:
    duckdb_path: data/audit/dc3s_audit.duckdb
    table_name: dispatch_certificates
    state_table_name: dc3s_online_state
