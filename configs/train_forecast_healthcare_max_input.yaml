# Healthcare max-input training config
dataset:
  key: HEALTHCARE_MAX_INPUT
  label: Healthcare Vital Signs (BIDMC + MIMIC3 max-input)
  source: ORIUS
  region_group: multi-domain

task:
  horizon_hours: 0.001
  lookback_hours: 0.1
  quantiles: [0.1, 0.5, 0.9]
  targets: [hr_bpm, spo2_pct, respiratory_rate, shock_index]

seed: 42
seeds: [42, 123]

cross_validation:
  enabled: false
  n_folds: 5
  strategy: time_series
  gap: 1

data:
  processed_path: data/healthcare/max_input/features.parquet
  timestamp_col: timestamp

splits:
  train_ratio: 0.70
  calibration_ratio: 0.05
  val_ratio: 0.10
  gap_hours: 0

models:
  baseline_gbm:
    kind: lightgbm
    enabled: true
    params:
      n_estimators: 500
      learning_rate: 0.03
      max_depth: 10
      num_leaves: 128
      min_child_samples: 25
      subsample: 0.85
      colsample_bytree: 0.85
      reg_alpha: 0.1
      reg_lambda: 1.0
      verbosity: -1
  quantile_gbm:
    kind: lightgbm
    enabled: true
    params:
      n_estimators: 400
      learning_rate: 0.03
      max_depth: 10
      num_leaves: 128
      verbosity: -1
  dl_lstm:
    enabled: false
  dl_tcn:
    enabled: false
  dl_nbeats:
    enabled: false
  dl_patchtst:
    enabled: false
  dl_tft:
    enabled: false

artifacts:
  out_dir: artifacts/models_healthcare_max_input
reports:
  out_dir: reports/healthcare_max_input

backtest:
  enabled: true
  out_path: reports/healthcare_max_input/walk_forward_report.json

tuning:
  enabled: false

tracking:
  enabled: false
