        types: [function_too_large]
      - path: src/orius/universal_theory/theorem_discharge.py
        types: [function_too_complex]

  retraining_acceptance:
    metric: mape
    metric_by_target:
      solar_mw: smape
      price_eur_mwh: smape
      spo2_pct: rmse
      respiratory_rate: rmse
    require_non_regression: true
    min_improvement_by_target:
      load_mw: 0.005
      wind_mw: 0.002
      solar_mw: 0.0
      price_eur_mwh: 0.0
    max_cv_rmse_std: 1000.0
    profile_overrides:
      production-max-fast:
        min_improvement_by_target:
          load_mw: 0.005
          wind_mw: 0.002
          solar_mw: 0.0
          price_eur_mwh: 0.0
        absolute_regression_tolerance_by_target:
          price_eur_mwh: 0.0005
          spo2_pct: 0.06
          respiratory_rate: 0.03
    retain_incumbent_on_regression_targets:
      - load_mw
      - wind_mw
      - solar_mw
      - price_eur_mwh
      - hr_bpm
      - spo2_pct
      - respiratory_rate

  go_no_go:
    safety_violations: 0
    certificate_completeness_rate_min: 0.99
    ack_success_rate_min: 0.99
    hold_rate_max: 0.01
    require_no_critical_alerts: true
