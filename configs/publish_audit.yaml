publish_audit:
  reproducibility:
    out_dir: reports/publish
    run_id_prefix: publish
    seeds:
      DE: [42, 123, 456, 789, 2024, 1337, 7777, 9999]
      US: [42, 123, 456, 789, 2024]

  scope:
    include:
      - src/orius/**
      - services/api/**
      - scripts/**
      - configs/**
      - iot/**
    non_blocking_out_of_scope:
      - frontend visual/style-only changes
      - paper formatting/layout artifacts
      - generated figure diffs

  na_policy:
    strict: true
    default_max_ratio: 0.0
    allowlist:
      - path_glob: data/audit/iot_loop.duckdb::iot_ack
        columns: [reason]
        max_ratio: 1.0
      - path_glob: data/audit/iot_loop.duckdb::iot_command_queue
        columns: [expires_at, timeout_at, timeout_reason]
        max_ratio: 1.0
      - path_glob: data/audit/iot_loop.duckdb::iot_device_state
        columns: [hold_reason, hold_since_utc]
        max_ratio: 1.0
      - path_glob: data/audit/dc3s_audit.duckdb::dispatch_certificates
        columns: [intervention_reason, prev_hash]
        max_ratio: 1.0
      - path_glob: reports/metrics/forecast_point_metrics.csv
        columns: [daylight_mape]
        max_ratio: 1.0
      - path_glob: reports/metrics/forecast_window_metrics.csv
        columns: [daylight_mape]
        max_ratio: 1.0
      - path_glob: reports/publication/tables/table2_forecast_metrics_de.csv
        columns: [daylight_mape]
        max_ratio: 1.0
      - path_glob: reports/publication/tables/table3_forecast_metrics_us.csv
        columns: [daylight_mape]
        max_ratio: 1.0
      - path_glob: reports/publication/dc3s_main_table.csv
        columns: [carbon_kg]
        max_ratio: 1.0
      - path_glob: reports/publication/tables/table5_optimization_impact.csv
        columns: [Delta]
        max_ratio: 1.0
      - path_glob: reports/ablations/ablation_results.csv
        columns: [total_cost, oracle_cost, regret, regret_pct, carbon_emissions, infeasible_rate]
        max_ratio: 1.0
      - path_glob: reports/ablations/ablation_summary.csv
        columns: [mean_cost, median_cost, std_cost, mean_regret_pct, mean_infeasible_rate, ci_lower, ci_upper]
        max_ratio: 1.0
      - path_glob: reports/ablations_smoke/ablation_results.csv
        columns: [total_cost, oracle_cost, regret, regret_pct, carbon_emissions, infeasible_rate]
        max_ratio: 1.0
      - path_glob: reports/ablations_smoke/ablation_summary.csv
        columns: [mean_cost, median_cost, std_cost, mean_regret_pct, mean_infeasible_rate, ci_lower, ci_upper]
        max_ratio: 1.0
      - path_glob: reports/research_metrics_de.csv
        columns: [faci_scale_bound_lower, faci_scale_bound_upper, window_idx, window_start, window_end]
        max_ratio: 1.0
      - path_glob: reports/research_metrics_us.csv
        columns: [mean_stressed_interval_width, operational_grid_cap_mw, reserve_soc_mwh, terminal_soc_target_mwh, load_stress_additive_mw, stress_interval_multiplier, faci_scale_bound_lower, faci_scale_bound_upper, window_idx, window_start, window_end]
        max_ratio: 1.0

  leakage_gates:
    max_overlap_train_calibration: 0
    max_overlap_calibration_val: 0
    max_overlap_calibration_test: 0
    max_overlap_train_val: 0
    max_overlap_train_test: 0
    max_overlap_val_test: 0
    forbidden_feature_exact:
      - y_true
      - target_value
      - label
    forbidden_feature_patterns:
      - "(?i)lead"
      - "(?i)future"
      - "(?i)next_"
      - "(?i)t\\+"
      - "(?i)forward"

  code_health:
    max_function_lines: 180
    max_cyclomatic_estimate: 30
    max_file_lines: 1200
    fail_on_bare_except: true
    fail_on_except_pass: true
    fail_on_unused_imports: false
    known_violations:
      # Legacy monolith backlog documented for tracking; new paths/types still fail.
      # No except_pass entries are allowlisted.
      - path: scripts/audit_leakage.py
        types: [function_too_large]
      - path: scripts/backfill_dc3s_typed_columns.py
        types: [function_too_complex, function_too_large]
      - path: scripts/build_battery_av_closure_artifacts.py
        types: [function_too_large]
      - path: scripts/build_certos_artifacts.py
        types: [function_too_complex]
      - path: scripts/build_clean_artifact_release.py
        types: [function_too_complex, function_too_large]
      - path: scripts/build_equal_domain_artifact_discipline.py
        types: [function_too_complex]
      - path: scripts/build_nuplan_closed_loop_artifacts.py
