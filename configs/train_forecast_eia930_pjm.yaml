dataset:
  key: US_PJM
  label: USA (EIA-930 PJM)
  source: EIA-930
  balancing_authority: PJM
  region_group: US

task:
  horizon_hours: 24
  lookback_hours: 168
  quantiles: [0.1, 0.5, 0.9]
  targets: [load_mw, wind_mw, solar_mw]

seed: 42
seeds: [42, 123, 456, 789, 2024]

cross_validation:
  enabled: true
  n_folds: 10
  strategy: time_series
  gap: 24

data:
  processed_path: data/processed/us_eia930_pjm/features.parquet
  timestamp_col: timestamp

splits:
  train_ratio: 0.70
  calibration_ratio: 0.05
  val_ratio: 0.15
  gap_hours: 24

models:
  baseline_gbm:
    kind: lightgbm
    enabled: true
    params:
      n_estimators: 1000
      learning_rate: 0.03
      max_depth: 12
      num_leaves: 256
      min_child_samples: 15
      subsample: 0.85
      colsample_bytree: 0.85
      reg_alpha: 0.1
      reg_lambda: 1.0
      verbosity: -1
      feature_fraction_seed: 42
      bagging_seed: 42
  quantile_gbm:
    kind: lightgbm
    enabled: true
    params:
      n_estimators: 400
      learning_rate: 0.05
      max_depth: 8
      num_leaves: 64
      min_child_samples: 20
      subsample: 0.9
      colsample_bytree: 0.9
      verbosity: -1
  dl_lstm:
    kind: lstm
    enabled: true
    params:
      hidden_size: 256
      num_layers: 3
      dropout: 0.3
      epochs: 100
      batch_size: 128
      learning_rate: 0.001
      weight_decay: 1e-5
      scheduler: cosine
      warmup_epochs: 5
      early_stopping:
        enabled: true
        patience: 15
        min_delta: 0.0001
      gradient_clip: 1.0
  dl_tcn:
    kind: tcn
    enabled: true
    params:
      num_channels: [128, 128, 128, 64]
      kernel_size: 5
      dropout: 0.3
      epochs: 100
      batch_size: 128
      learning_rate: 0.001
      weight_decay: 1e-5
      scheduler: cosine
      warmup_epochs: 5
      early_stopping:
        enabled: true
        patience: 15
        min_delta: 0.0001
      gradient_clip: 1.0
  dl_nbeats:
    kind: nbeats
    enabled: true
    params:
      hidden_dim: 384
      num_blocks: 4
      dropout: 0.1
      epochs: 120
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 5
      gradient_clip: 1.0
      early_stopping:
        enabled: true
        patience: 18
        min_delta: 0.0001
  dl_tft:
    kind: tft
    enabled: true
    params:
      d_model: 128
      n_heads: 4
      num_layers: 2
      dim_feedforward: 256
      dropout: 0.1
      epochs: 120
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 5
      gradient_clip: 1.0
      early_stopping:
        enabled: true
        patience: 18
        min_delta: 0.0001
  dl_patchtst:
    kind: patchtst
    enabled: true
    params:
      patch_len: 24
      stride: 12
      d_model: 128
      n_heads: 4
      num_layers: 2
      dim_feedforward: 256
      dropout: 0.1
      epochs: 120
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 5
      gradient_clip: 1.0
      early_stopping:
        enabled: true
        patience: 18
        min_delta: 0.0001

artifacts:
  out_dir: artifacts/models_eia930_pjm
reports:
  out_dir: reports/eia930_pjm

backtest:
  enabled: true
  out_path: reports/eia930_pjm/walk_forward_report.json

tuning:
  enabled: true
  engine: optuna
  n_trials: 120
  metric: val_loss
  direction: minimize
  selection_mode: top_pct_median
  select_top_pct: 0.30
  min_top_trials: 5
  n_jobs: 4
  pruner: median
  params:
    baseline_gbm:
      n_estimators: {type: int, low: 500, high: 2000}
      learning_rate: {type: float, low: 0.005, high: 0.1, log: true}
      max_depth: {type: int, low: 8, high: 15}
      num_leaves: {type: int, low: 64, high: 512}

tracking:
  enabled: true
  tool: mlflow
  experiment_name: gridpulse_forecast
  log_models: true
  log_system_metrics: true

distributed:
  enabled: false
  backend: nccl
  nproc_per_node: 1
