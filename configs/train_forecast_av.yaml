# AV (Autonomous Vehicles) domain training config
dataset:
  key: AV
  label: nuPlan All-Zip Grouped AV Replay
  source: nuPlan
  region_group: multi-domain

task:
  horizon_hours: 0.1  # 6 min at 0.1s steps
  lookback_hours: 1.0
  lookback_steps: 24  # Explicit sequence window for DL models.
  quantiles: [0.1, 0.5, 0.9]
  targets:
    - target_ego_speed_mps__1s
    - target_relative_gap_m__1s
    - target_ego_speed_mps__2s
    - target_relative_gap_m__2s
    - target_ego_speed_mps__4s
    - target_relative_gap_m__4s

seed: 42
seeds: [42, 123, 456, 789]

cross_validation:
  enabled: false
  n_folds: 5
  strategy: time_series
  gap: 1

data:
  processed_path: data/orius_av/av/processed_nuplan_allzip_grouped/anchor_features.parquet
  timestamp_col:
  order_cols: [scenario_id, step_index]
  non_feature_cols: [scenario_id, shard_id, record_index, step_index, ego_track_id, split]

splits:
  train_ratio: 0.70
  calibration_ratio: 0.05
  val_ratio: 0.10
  gap_hours: 0

models:
  baseline_gbm:
    kind: lightgbm
    enabled: true
    params:
      n_estimators: 200
      learning_rate: 0.05
      max_depth: 6
      num_leaves: 32
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.8
      verbosity: -1
  quantile_gbm:
    kind: lightgbm
    enabled: true
    params:
      n_estimators: 150
      learning_rate: 0.05
      max_depth: 6
      num_leaves: 32
      verbosity: -1
  dl_lstm:
    enabled: true
    params:
      hidden_size: 128
      num_layers: 2
      dropout: 0.2
      epochs: 180
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 8
      gradient_clip: 1.0
      bidirectional: true
      attention: true
      early_stopping:
        enabled: true
        patience: 24
        min_delta: 0.0001
  dl_tcn:
    enabled: true
    params:
      num_channels: [128, 128, 64]
      kernel_size: 5
      dilation_base: 2
      dropout: 0.2
      epochs: 180
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 8
      gradient_clip: 1.0
      use_skip_connections: true
      early_stopping:
        enabled: true
        patience: 24
        min_delta: 0.0001
  dl_nbeats:
    enabled: true
    params:
      hidden_dim: 256
      num_blocks: 3
      dropout: 0.1
      epochs: 160
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 8
      gradient_clip: 1.0
      early_stopping:
        enabled: true
        patience: 20
        min_delta: 0.0001
  dl_tft:
    enabled: true
    params:
      d_model: 96
      n_heads: 4
      num_layers: 2
      dim_feedforward: 192
      dropout: 0.1
      epochs: 160
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 8
      gradient_clip: 1.0
      early_stopping:
        enabled: true
        patience: 20
        min_delta: 0.0001
  dl_patchtst:
    enabled: true
    params:
      patch_len: 8
      stride: 4
      d_model: 96
      n_heads: 4
      num_layers: 2
      dim_feedforward: 192
      dropout: 0.1
      epochs: 160
      batch_size: 128
      learning_rate: 0.0005
      weight_decay: 1e-5
      warmup_epochs: 8
      gradient_clip: 1.0
      early_stopping:
        enabled: true
        patience: 20
        min_delta: 0.0001

backtest:
  enabled: true
  out_path: reports/orius_av/nuplan_allzip_grouped/walk_forward_report.json

tuning:
  enabled: false
  engine: optuna
  n_trials: 60
  metric: val_loss
  direction: minimize
  selection_mode: top_pct_median
  select_top_pct: 0.20
  min_top_trials: 5
  params:
    baseline_gbm:
      n_estimators: {type: int, low: 200, high: 1200}
      learning_rate: {type: float, low: 0.005, high: 0.08, log: true}
      max_depth: {type: int, low: 4, high: 10}
      num_leaves: {type: int, low: 16, high: 128}
      min_child_samples: {type: int, low: 10, high: 40}
      subsample: {type: float, low: 0.6, high: 1.0}
      colsample_bytree: {type: float, low: 0.6, high: 1.0}
      reg_alpha: {type: float, low: 1e-4, high: 10.0, log: true}
      reg_lambda: {type: float, low: 1e-4, high: 10.0, log: true}
