# DC3S configuration for the Vehicle / AV proof domain.
# This file mirrors the structure of configs/dc3s.yaml (battery reference) so that
# the universal validation harness can load domain-specific parameters per track.

dc3s:
  assumptions_version: dc3s-vehicle-v1

  # Telemetry heartbeat: 4 Hz AV sensor tick
  expected_cadence_s: 0.25

  # Inflation law
  law: linear
  k_quality: 0.5       # sensitivity to w_t drop
  k_drift: 0.3         # sensitivity to drift detection
  k_sensitivity: 0.02  # dispatch sensitivity weighting
  infl_max: 2.0        # maximum inflation multiplier

  reliability:
    lambda_delay: 0.010   # faster decay for AV latency budget
    spike_beta: 0.20      # tighter spike threshold (high-fidelity sensors)
    ooo_gamma: 0.30       # out-of-order penalty
    min_w: 0.05           # minimum quality score

  ftit:
    decay: 0.98
    stale_k: 5            # slightly more tolerance for AV GPS lag
    stale_tol: 1.0e-9
    alpha_dropout: 1.0
    alpha_stale_sensor: 1.0
    alpha_delay_jitter: 1.0
    alpha_out_of_order: 1.0
    alpha_spikes: 1.0
    sigma2_init: 1.0
    delta: 0.05

  drift:
    detector: page_hinkley
    ph_delta: 0.005
    ph_lambda: 3.0
    warmup_steps: 20
    cooldown_steps: 10

  shield:
    mode: l2_projection
    reserve_soc_pct_drift: 0.05   # conservative headway reserve under drift

  # Vehicle-specific constraint defaults
  vehicle:
    dt_s: 0.25
    accel_min_mps2: -5.0
    accel_max_mps2: 3.0
    min_headway_m: 5.0
    headway_time_s: 2.0
    speed_limit_mps: 30.0

  audit:
    duckdb_path: data/audit/dc3s_vehicle_audit.duckdb
    table_name: dispatch_certificates
    state_table_name: dc3s_vehicle_online_state
