notes:
  metric_policy: "Numeric claims in prose should use \\PaperMetric keys and default to locked values until retraining refreshes metrics_values.tex."
  longform_structure:
    - "paper/longform/theorem_block_longform.tex imports thesis chapters ch15-ch20 into the primary paper build."
    - "paper/longform/hardening_block_longform.tex imports thesis chapters ch21-ch32 into the primary paper build."
    - "paper/longform/closing_block_longform.tex imports thesis chapters ch33-ch36 into the primary paper build."
    - "paper/longform/appendix_block_longform.tex imports selected thesis appendices into the primary paper build."
  coverage_map: "reports/publication/paper_thesis_coverage_map.csv"
  refresh_flow:
    - "python scripts/verify_integrated_theorem_surface.py"
    - "python scripts/run_universal_orius_validation.py"
    - "python scripts/generate_architecture_diagram.py --paper paper/assets/figures/fig01_architecture"
    - "python scripts/generate_paper_figures_fig12_fig13_fig58.py"
    - "python scripts/sync_paper_figures.py"
    - "python scripts/generate_multi_domain_figure.py"
    - "python scripts/build_publication_artifact.py --release-id <RELEASE_ID> --out-dir reports/publication"
    - "python scripts/sync_paper_assets.py --check"
    - "python scripts/build_conference_assets.py --out-dir reports/publication --dataset-summary reports/publication/tables/table1_dataset_summary.csv"
    - "bash scripts/export_paper_assets.sh"
    - "python scripts/build_paper_table_tex.py"
    - "python scripts/update_paper_metrics.py"
    - "cd paper && pdflatex paper.tex && pdflatex paper.tex"
