[pytest]
addopts = -q -m "not slow and not integration and not local_data and not artifact_mutation"
pythonpath = src .
testpaths = tests
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests requiring external services
    local_data: marks tests requiring local datasets or heavyweight generated artifacts
    artifact_mutation: marks tests that intentionally write or regenerate tracked artifact surfaces
    load: marks load/performance tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
