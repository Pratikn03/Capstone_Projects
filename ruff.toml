target-version = "py311"
line-length = 110
exclude = [
  ".git",
  ".mypy_cache",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "**/._*",
  "**/__pycache__",
]

[lint]
select = ["E", "F", "W", "I", "B", "C4", "UP", "SIM", "A", "T20", "RUF", "S", "C90"]
ignore = [
  "E203",
  "E266",
  "E501",
  "S101",
  "B008",
  # ORIUS manuscripts, theorem strings, and figure labels intentionally use
  # mathematical symbols. Keep source checks strict without treating those as
  # spoofing-risk findings.
  "RUF001",
  "RUF002",
  "RUF003",
  # These are readability preferences, not safety gates for the current audit.
  "SIM102",
  "SIM108",
  "SIM113",
  "RUF034",
  "UP031",
]

[lint.mccabe]
max-complexity = 40

[lint.per-file-ignores]
"scripts/**/*.py" = [
  "T20",
  "E402",
  "C901",
  "S105",
  "S106",
  "S108",
  "S110",
  "S112",
  "S301",
  "S310",
  "S311",
  "S603",
  "S607",
  "S608",
  "SIM115",
]
"tests/**/*.py" = [
  "T20",
  "E402",
  "RUF012",
  "S101",
  "S105",
  "S106",
  "S108",
  "S110",
  "S311",
  "S603",
  "S607",
  "S608",
]
"services/api/routers/monitor.py" = ["S110"]
"src/orius/av_nuplan/surface.py" = ["S608"]
"src/orius/anomaly/detection.py" = ["S301"]
"src/orius/av_waymo/training.py" = ["S301"]
"src/orius/certos/verification.py" = ["S608"]
"src/orius/cpsbench_iot/runner.py" = ["S108", "S110"]
"src/orius/data_pipeline/storage.py" = ["S608"]
"src/orius/dc3s/certificate.py" = ["S608"]
"src/orius/dc3s/graceful.py" = ["S311"]
"src/orius/dc3s/state.py" = ["S608"]
"src/orius/data_pipeline/build_features_eia930.py" = ["S110", "S310"]
"src/orius/forecasting/predict.py" = ["S301"]
"src/orius/forecasting/train.py" = ["T20", "C901", "S112", "S603"]
"src/orius/monitoring/dc3s_health.py" = ["S608"]
"src/orius/optimizer/lp_dispatch.py" = ["C901"]
"src/orius/orius_bench/real_data_loader.py" = ["E402", "S110"]
"src/orius/pipeline/run.py" = ["C901", "S603", "S607"]
"src/orius/streaming/worker.py" = ["S110"]
"src/orius/streaming/consumer.py" = ["S608"]
"src/orius/utils/logging.py" = ["A005"]
"src/orius/utils/manifest.py" = ["S110", "S603", "S607"]
"src/orius/utils/seed.py" = ["S110"]

[format]
quote-style = "double"
indent-style = "space"
